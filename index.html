<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GinoNote - Đồng bộ Web (Giao diện App)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme mobile-app-mode">

    <header class="app-header">
        <div class="header-left">
            <button class="icon-btn" id="menuBtn">
                <i class="material-icons">menu</i>
            </button>
            <a href="#" class="logo-container">
                <img src="ginonote/logo.png" alt="GinoNote" onerror="this.style.display='none'">
                <span>GinoNote</span>
            </a>
        </div>
        
        <div class="header-right">
            <button class="sync-btn active-auth" id="btnAuthGoogle">
                <i class="material-icons">cloud_sync</i>
                <span id="syncText">Đã đồng bộ</span>
            </button>
        </div>
    </header>

    <div class="app-body">
        <nav class="sidebar" id="sidebar">
            <ul class="nav-list">
                <li>
                    <a href="#" class="nav-item active">
                        <i class="material-icons">lightbulb</i>
                        <span class="nav-text">Tất cả ghi chú</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-item">
                        <i class="material-icons">calendar_today</i>
                        <span class="nav-text">Lịch</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-item">
                        <i class="material-icons">label</i>
                        <span class="nav-text">Tags</span>
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <div class="notes-grid" id="notesGrid">
                <div class="note-card">
                    <div class="note-title">Ôn tập Tiếng Anh</div>
                    <div class="note-body">Hôm nay cần học 50 từ vựng mới và làm bài tập ngữ pháp...</div>
                    <div class="note-tags">
                        <span class="tag">Tiếng Anh</span>
                    </div>
                </div>
                <div class="note-card note-urgent">
                    <div class="note-title">Ý tưởng App</div>
                    <div class="note-body">Thiết kế FAB (+) và màn hình editor chi tiết y hệt app.</div>
                    <div class="note-tags">
                        <span class="tag">Dev</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <button class="fab-btn" id="fabBtn">
        <i class="material-icons">add</i>
    </button>

    <div class="note-editor-overlay" id="noteEditor">
        <div class="editor-header">
            <button class="icon-btn" id="closeEditorBtn">
                <i class="material-icons">arrow_back</i>
            </button>
            <div class="editor-title-container">
                <input type="text" id="editNoteTitle" placeholder="Tiêu đề (Không bắt buộc)" class="editor-title-input">
            </div>
            <div class="editor-header-actions">
                <button class="icon-btn" id="saveNoteBtn">
                    <i class="material-icons">done</i>
                </button>
            </div>
        </div>
        
        <div class="editor-body">
            <textarea id="editNoteBody" placeholder="Nội dung ghi chú..." class="editor-textarea"></textarea>
        </div>

        <div class="editor-tags-input-area">
            <i class="material-icons" style="color: var(--text-light);">label</i>
            <div id="editorTagList" class="editor-tag-list">
                <span class="tag">GinoNote</span>
            </div>
            <input type="text" id="newTagInput" placeholder="Thêm tag..." class="tag-input">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
