<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GinoNote Web</title>
    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .btn { padding: 10px 20px; background-color: #4285F4; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-right: 10px;}
        .btn:hover { background-color: #357ae8; }
        #content { margin-top: 20px; }
        .note-item { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; background-color: #f9f9f9;}
        .note-title { font-weight: bold; font-size: 18px; color: #333; }
        .note-time { font-size: 12px; color: #777; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>GinoNote Web - Quản lý Ghi chú</h1>
    <p>Đồng bộ dữ liệu trực tiếp từ thư mục ẩn Google Drive.</p>
    
    <button id="authorize_button" class="btn" style="display: none;" onclick="handleAuthClick()">Đăng nhập Google</button>
    <button id="signout_button" class="btn" style="display: none;" onclick="handleSignoutClick()">Đăng xuất</button>

    <div id="content">Đang tải cấu hình Google...</div>

    <script>
        // MÃ CLIENT ID CỦA BẠN ĐÃ ĐƯỢC ĐIỀN SẴN
        const CLIENT_ID = '631532964907-hi703ubcopoqjmv0e5fn6ui3h2u2mi5b.apps.googleusercontent.com'; 
        
        // Yêu cầu quyền truy cập thư mục ẩn (Khớp với quyền trên app GinoNote Android)
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';

        let tokenClient;
        let gapiInited = false;
        let gisInited = false;

        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'],
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '', 
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                document.getElementById('authorize_button').style.display = 'inline-block';
                document.getElementById('content').innerText = 'Hãy đăng nhập để xem danh sách ghi chú.';
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                document.getElementById('signout_button').style.display = 'inline-block';
                document.getElementById('authorize_button').style.display = 'none';
                document.getElementById('content').innerText = 'Đang tải danh sách file...';
                
                // Sau khi đăng nhập thành công, tự động tải danh sách file
                listFiles();
            };

            if (gapi.client.getToken() === null) {
                tokenClient.requestAccessToken({prompt: 'consent'});
            } else {
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        function handleSignoutClick() {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token);
                gapi.client.setToken('');
                document.getElementById('content').innerText = 'Đã đăng xuất.';
                document.getElementById('authorize_button').style.display = 'inline-block';
                document.getElementById('signout_button').style.display = 'none';
            }
        }

        async function listFiles() {
            let response;
            try {
                // Gọi API lấy file, CHỈ TÌM TRONG appDataFolder (Thư mục ẩn)
                response = await gapi.client.drive.files.list({
                    spaces: 'appDataFolder',
                    fields: 'files(id, name, modifiedTime)',
                    pageSize: 100
                });
            } catch (err) {
                document.getElementById('content').innerText = "Lỗi khi tải file: " + err.message;
                return;
            }

            const files = response.result.files;
            if (!files || files.length == 0) {
                document.getElementById('content').innerText = 'Không tìm thấy ghi chú nào trong thư mục ẩn. Hãy chắc chắn bạn đã đồng bộ từ app Android lên.';
                return;
            }

            // In danh sách file ra màn hình
            let output = '<h3>Các file .gino của bạn:</h3>';
            files.forEach((file) => {
                output += `<div class="note-item">
                            <div class="note-title">${file.name}</div>
                            <div class="note-time">Sửa lần cuối: ${new Date(file.modifiedTime).toLocaleString('vi-VN')}</div>
                           </div>`;
            });
            document.getElementById('content').innerHTML = output;
        }
    </script>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>
</html>
